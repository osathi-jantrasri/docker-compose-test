services:
  db:
    image: postgres:16
    container_name: pg-db
    environment:
      POSTGRES_USER: postgres # กำหนด user ของ postgres
      POSTGRES_PASSWORD: postgres # กำหนด password ของ postgres
      POSTGRES_DB: tutorial # กำหนด database เริ่มต้น
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker-compose-test/test-mount/:/var/lib/postgresql/data/test-mount
      - ./entrypoint-pgdb.sh:/usr/local/bin/entrypoint-pgdb.sh
    entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint-pgdb.sh"]
    command: ["docker-entrypoint.sh", "postgres"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: osathijbem/java-server-test
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # รอจน postgres พร้อมรับ connection จริง ๆ ก่อน

  frontend:
    image: osathijbem/vue-test
    container_name: frontend
    ports:
      - "5173:80" # nginx serve บน port 80 ใน container, map ออกมาเป็น 5173
    depends_on:
      - backend

volumes:
  pg-data: